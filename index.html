<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>월급 관리 에이전트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Pretendard-Regular&display=swap');

  :root{
    --navy:#1B2A4A;
    --navy-2:#233457;
    --ivory:#F1ECE1;
    --paper:#FAF7EF;
    --brass:#B08D57;
    --brass-2:#8C6D3E;
    --coral:#C15B4B;
    --sage:#6B8F71;
    --line:#D8D0BC;
    --ink:#2A2620;
  }
  *{box-sizing:border-box;}
  #budget-root{
    background:var(--paper);
    color:var(--ink);
    font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    padding:28px 20px 60px;
    max-width:720px;
    margin:0 auto;
    min-height:100%;
  }
  #budget-root h1,#budget-root h2,#budget-root h3{
    font-family:'Noto Serif KR',serif;
    color:var(--navy);
    margin:0;
  }
  .hero{
    display:flex;
    align-items:center;
    gap:14px;
    border-bottom:2px solid var(--navy);
    padding-bottom:16px;
    margin-bottom:22px;
  }
  .hero .stamp{
    width:46px;height:46px;border-radius:50%;
    border:2px solid var(--brass);
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif KR',serif;font-weight:700;color:var(--brass-2);
    font-size:13px;flex-shrink:0;
  }
  .hero h1{font-size:22px;letter-spacing:-0.3px;}
  .hero p{margin:2px 0 0;font-size:12.5px;color:#6b6455;}

  .card{
    background:var(--ivory);
    border:1px solid var(--line);
    border-radius:6px;
    padding:18px 18px 20px;
    margin-bottom:16px;
  }
  .card h2{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .card h2::before{content:'';width:6px;height:6px;background:var(--brass);display:inline-block;}

  label{font-size:12.5px;color:#6b6455;display:block;margin-bottom:4px;}
  input[type=number],input[type=text],input[type=number]::placeholder{font-family:inherit;}
  input[type=number],input[type=text]{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:4px;
    background:var(--paper);font-size:14px;color:var(--ink);
  }
  input:focus{outline:2px solid var(--brass);outline-offset:1px;}

  .row{display:flex;gap:10px;align-items:flex-end;margin-bottom:8px;flex-wrap:wrap;}
  .row > div{flex:1;min-width:100px;}
  .row .amt{max-width:120px;}
  .row .day{max-width:70px;}
  .row .bank{max-width:110px;}

  button{
    font-family:inherit;cursor:pointer;border:none;border-radius:4px;
    font-size:13px;padding:9px 14px;font-weight:600;
  }
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-2);}
  .btn-ghost{background:transparent;color:var(--brass-2);border:1px solid var(--brass);}
  .btn-ghost:hover{background:rgba(176,141,87,0.1);}
  .btn-del{background:transparent;color:var(--coral);font-size:16px;padding:4px 8px;line-height:1;}
  .btn-add{background:transparent;color:var(--navy);border:1px dashed var(--line);width:100%;margin-top:2px;padding:7px;}
  .btn-add:hover{border-color:var(--brass);color:var(--brass-2);}

  .gross-input{display:flex;gap:10px;align-items:flex-end;}
  .gross-input div{flex:1;}
  .gross-input button{flex-shrink:0;}

  .net-display{
    margin-top:14px;padding:14px;background:var(--paper);border:1px dashed var(--brass);border-radius:4px;
  }
  .net-display .amount{font-family:'Noto Serif KR',serif;font-size:26px;color:var(--navy);font-weight:700;}
  .net-display .label{font-size:12px;color:#6b6455;}
  details summary{font-size:12px;color:var(--brass-2);cursor:pointer;margin-top:8px;}
  .basis{font-size:12px;color:#6b6455;line-height:1.8;margin-top:6px;}
  .basis .disclaimer{color:var(--coral);font-size:11.5px;margin-top:4px;}

  .subrow{
    display:flex;gap:8px;align-items:center;padding:6px 0;
    border-bottom:1px dotted var(--line);
  }
  .subrow:last-of-type{border-bottom:none;}

  .error-box{
    background:#F7E9E6;border:1px solid var(--coral);color:var(--coral);
    padding:10px 12px;border-radius:4px;font-size:13px;margin-top:10px;
  }

  #summary-card{
    background:var(--navy);color:var(--ivory);border-radius:6px;padding:22px 20px;position:relative;overflow:hidden;
  }
  #summary-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--brass);
  }
  #summary-card h2{color:var(--ivory);}
  #summary-card h2::before{background:var(--brass);}
  .sum-total{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--brass);margin:14px 0 6px;letter-spacing:0.5px;}
  .sum-line{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;border-bottom:1px solid rgba(241,236,225,0.15);}
  .sum-line.sub{padding-left:14px;font-size:12.5px;color:#cfc9ba;border-bottom:none;}
  .sum-line .amt{font-variant-numeric:tabular-nums;}
  .sum-line.head{font-weight:700;}
  .sum-line.auto .amt{color:var(--brass);}
  .actions{display:flex;gap:10px;margin-top:18px;}
</style>
</head>
<body style="margin:0;background:#FAF7EF;">

<div id="budget-root">
  <div class="hero">
    <div class="stamp">봉급</div>
    <div>
      <h1>월급 관리 에이전트</h1>
      <p>세후 실수령 월급을 정해진 카테고리로 나눠드려요.</p>
    </div>
  </div>

  <div class="card">
    <h2>세후 실수령 월급</h2>
    <div class="gross-input">
      <div>
        <label>월 실수령액 (원)</label>
        <input type="number" id="netInput" placeholder="예: 3200000" min="0">
      </div>
      <button class="btn-primary" onclick="setNetDirect()">적용</button>
    </div>
    <details style="margin-top:10px">
      <summary>월급을 모르면 연봉으로 추정하기</summary>
      <div class="gross-input" style="margin-top:8px">
        <div>
          <label>세전 연봉 (원)</label>
          <input type="number" id="grossInput" placeholder="예: 45000000" min="0">
        </div>
        <button class="btn-ghost" onclick="calcEstimate()">추정</button>
      </div>
      <div class="net-display" id="netDisplay" style="display:none">
        <div class="label">월 실수령액 (추정)</div>
        <div class="amount" id="netAmount">₩0</div>
        <div class="basis" id="basisText"></div>
        <button class="btn-ghost" style="margin-top:8px" onclick="importEstimate()">이 금액 가져오기</button>
      </div>
    </details>
  </div>

  <div class="card" id="categoriesCard" style="display:none">
    <h2>카테고리별 소분류</h2>
    <div id="categoriesContainer"></div>
  </div>

  <div class="card" id="summaryWrap" style="display:none">
    <div id="summary-card">
      <h2>월급 분배 요약</h2>
      <div id="summaryBody"></div>
    </div>
    <div id="errorBox"></div>
    <div class="actions">
      <button class="btn-ghost" onclick="exportCSV()">CSV 다운로드</button>
      <button class="btn-ghost" onclick="exportImage()">이미지 저장</button>
    </div>
  </div>
</div>

<script>
(function(){
  const CATS = ['저축','투자','비상금','소비','ME 비용'];
  let state = { net: null, categories: {} };
  CATS.forEach(c => state.categories[c] = []);
  let uid = 0;

  function loadState(){
    try{
      const raw = localStorage.getItem('budget-data');
      if(raw){
        const saved = JSON.parse(raw);
        state.net = saved.net || null;
        state.categories = saved.categories || state.categories;
        CATS.forEach(c => { if(!state.categories[c]) state.categories[c] = []; });
        if(state.net) document.getElementById('netInput').value = state.net;
      }
    }catch(e){ /* no saved data yet */ }
    if(state.net){
      document.getElementById('categoriesCard').style.display='block';
      document.getElementById('summaryWrap').style.display='block';
      renderCategories();
      renderSummary();
    }
  }

  function saveState(){
    try{
      localStorage.setItem('budget-data', JSON.stringify({
        net: state.net, categories: state.categories
      }));
    }catch(e){ console.error('저장 실패', e); }
  }

  function won(n){ return '₩' + Math.round(n).toLocaleString('ko-KR'); }

  function calcTax(annualGross){
    let deduction;
    if(annualGross<=5000000) deduction = annualGross*0.7;
    else if(annualGross<=15000000) deduction = 3500000+(annualGross-5000000)*0.4;
    else if(annualGross<=45000000) deduction = 7500000+(annualGross-15000000)*0.15;
    else if(annualGross<=100000000) deduction = 12000000+(annualGross-45000000)*0.05;
    else deduction = 14750000+(annualGross-100000000)*0.02;
    deduction = Math.min(deduction, 20000000);
    const earned = annualGross - deduction;

    const monthlyGross = annualGross/12;
    const npCap = 5900000;
    const npBase = Math.min(monthlyGross, npCap);
    const nationalPension = npBase*0.045*12;
    const health = monthlyGross*0.03545*12;
    const longTermCare = health*0.1295;
    const employment = monthlyGross*0.009*12;
    const total4major = nationalPension+health+longTermCare+employment;

    let taxBase = earned - 1500000 - total4major;
    if(taxBase<0) taxBase=0;
    let tax;
    if(taxBase<=14000000) tax = taxBase*0.06;
    else if(taxBase<=50000000) tax = 840000+(taxBase-14000000)*0.15;
    else if(taxBase<=88000000) tax = 6240000+(taxBase-50000000)*0.24;
    else if(taxBase<=150000000) tax = 15360000+(taxBase-88000000)*0.35;
    else if(taxBase<=300000000) tax = 37060000+(taxBase-150000000)*0.38;
    else tax = 94060000+(taxBase-300000000)*0.4;
    const localTax = tax*0.1;
    const totalTax = tax+localTax;

    const netAnnual = annualGross - total4major - totalTax;
    return {
      netMonthly: netAnnual/12,
      insMonthly: total4major/12,
      taxMonthly: totalTax/12
    };
  }

  let lastEstimate = null;

  window.setNetDirect = function(){
    const v = parseFloat(document.getElementById('netInput').value);
    if(!v || v<=0){ alert('월 실수령액을 숫자로 입력해 주세요.'); return; }
    state.net = v;
    document.getElementById('categoriesCard').style.display='block';
    document.getElementById('summaryWrap').style.display='block';
    renderCategories();
    renderSummary();
    saveState();
  }

  window.calcEstimate = function(){
    const v = parseFloat(document.getElementById('grossInput').value);
    if(!v || v<=0){ alert('연봉을 숫자로 입력해 주세요.'); return; }
    const r = calcTax(v);
    lastEstimate = r.netMonthly;
    document.getElementById('netDisplay').style.display='block';
    document.getElementById('netAmount').textContent = won(r.netMonthly);
    document.getElementById('basisText').innerHTML =
      '4대보험(근로자부담) 약 '+won(r.insMonthly)+' / 소득세+지방세 약 '+won(r.taxMonthly)+'을(를) 월 환산하여 공제했습니다.'+
      '<div class="disclaimer">※ 세율은 1인 가구·기본공제 기준 추정치이며 실제 원천징수액과 차이가 있을 수 있습니다.</div>';
  }

  window.importEstimate = function(){
    if(lastEstimate == null) return;
    document.getElementById('netInput').value = Math.round(lastEstimate);
    setNetDirect();
  }

  function renderCategories(){
    const c = document.getElementById('categoriesContainer');
    c.innerHTML = '';
    CATS.forEach(cat=>{
      const box = document.createElement('div');
      box.style.marginBottom='16px';
      const total = state.categories[cat].reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
      box.innerHTML = `<h3 style="font-size:13.5px;display:flex;justify-content:space-between;margin-bottom:6px;">
        <span>${cat}</span><span style="color:var(--brass-2)">${won(total)}</span></h3>`;
      const list = document.createElement('div');
      list.id = 'list-'+cat;
      state.categories[cat].forEach(item=>{
        list.appendChild(subrowEl(cat,item));
      });
      box.appendChild(list);
      const addBtn = document.createElement('button');
      addBtn.className='btn-add';
      addBtn.textContent = '+ ' + cat + ' 소분류 추가';
      addBtn.onclick = ()=>addSub(cat);
      box.appendChild(addBtn);
      c.appendChild(box);
    });
  }

  function subrowEl(cat, item){
    const row = document.createElement('div');
    row.className='subrow';
    row.innerHTML = `
      <div style="flex:1.3"><input type="text" placeholder="소분류명" value="${item.name||''}" data-f="name"></div>
      <div class="amt"><input type="number" placeholder="금액" value="${item.amount||''}" data-f="amount"></div>
      <div class="day"><input type="number" placeholder="이체일" value="${item.day||''}" min="1" max="31" data-f="day"></div>
      <div class="bank"><input type="text" placeholder="통장" value="${item.bank||''}" data-f="bank"></div>
      <button class="btn-del" data-f="del">✕</button>
    `;
    row.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('input', (e)=>{
        item[e.target.dataset.f] = e.target.value;
        renderCategories(); renderSummary(); saveState();
      });
    });
    row.querySelector('[data-f=del]').addEventListener('click', ()=>{
      state.categories[cat] = state.categories[cat].filter(i=>i!==item);
      renderCategories(); renderSummary(); saveState();
    });
    return row;
  }

  function addSub(cat){
    state.categories[cat].push({id:++uid, name:'', amount:'', day:'', bank:''});
    renderCategories(); renderSummary(); saveState();
  }

  function catTotal(cat){
    return state.categories[cat].reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  }

  function renderSummary(){
    const net = state.net || 0;
    const fixedSum = CATS.reduce((s,c)=>s+catTotal(c),0);
    const remainder = net - fixedSum;
    const monthlyGathered = catTotal('저축')+catTotal('투자')+catTotal('비상금');
    const pct = (n)=> net>0 ? (n/net*100).toFixed(1) : '0.0';

    let html = `<div class="sum-total">월 실수령액: ${won(net)}</div>`;
    CATS.forEach(cat=>{
      const t = catTotal(cat);
      html += `<div class="sum-line head"><span>■ ${cat}</span><span class="amt">${won(t)} (${pct(t)}%)</span></div>`;
      state.categories[cat].forEach(item=>{
        if(item.name || item.amount){
          const day = item.day ? '매월 '+item.day+'일' : '이체일 미정';
          const bank = item.bank || '통장 미정';
          html += `<div class="sum-line sub"><span>${item.name||'(이름없음)'}</span><span class="amt">${won(parseFloat(item.amount)||0)} · ${day} · ${bank}</span></div>`;
        }
      });
    });
    html += `<div class="sum-line head auto"><span>■ 나머지 (자동 계산)</span><span class="amt">${won(remainder)} (${pct(remainder)}%)</span></div>`;
    html += `<div class="sum-line head auto"><span>■ 매달 모이는 돈 (자동 계산)</span><span class="amt">${won(monthlyGathered)} (${pct(monthlyGathered)}%)</span></div>`;
    document.getElementById('summaryBody').innerHTML = html;

    const errBox = document.getElementById('errorBox');
    if(fixedSum > net){
      errBox.innerHTML = `<div class="error-box">⚠ 저축+투자+비상금+소비+ME 비용의 합이 세후 월급을 ${won(fixedSum-net)} 초과했습니다. 금액을 조정해 주세요.</div>`;
    } else {
      errBox.innerHTML = '';
    }
  }

  window.exportCSV = function(){
    let rows = [['카테고리','소분류','금액','비율','자동이체일','통장']];
    const net = state.net || 0;
    const pct = (n)=> net>0 ? (n/net*100).toFixed(1) : '0.0';
    CATS.forEach(cat=>{
      state.categories[cat].forEach(item=>{
        rows.push([cat, item.name||'', item.amount||0, pct(parseFloat(item.amount)||0), item.day||'', item.bank||'']);
      });
    });
    const fixedSum = CATS.reduce((s,c)=>s+catTotal(c),0);
    const remainder = net - fixedSum;
    const monthlyGathered = catTotal('저축')+catTotal('투자')+catTotal('비상금');
    rows.push(['나머지','',remainder,pct(remainder),'','']);
    rows.push(['매달 모이는 돈','',monthlyGathered,pct(monthlyGathered),'','']);
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '월급분배.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  window.exportImage = function(){
    const el = document.getElementById('summary-card');
    html2canvas(el, {backgroundColor:'#1B2A4A', scale:2}).then(canvas=>{
      const a = document.createElement('a');
      a.download = '월급분배_요약.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  }

  loadState();
})();
</script>
</body>
</html>
